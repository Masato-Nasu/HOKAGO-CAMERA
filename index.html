<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>放課後CAMERA v4</title>
  <style>
    :root{
      --bg:#efe6d9;
      --panel:#f7f0e4;
      --paper:#f8f1e8;
      --brown:#8f5e34;
      --brown-dark:#6f492a;
      --brown-soft:#e7d7c0;
      --gold:#e7c26f;
      --mint:#d8e9e5;
      --line:#dcc9b3;
      --text:#342517;
      --muted:#87725d;
      --white:#fff9ef;
      --shadow:0 10px 24px rgba(55,38,22,.10);
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text)}
    body{min-height:100svh}
    button,input,select{font:inherit}
    .app{max-width:720px;margin:0 auto;padding:12px 12px 28px}
    .topbar{background:var(--brown);color:var(--white);border-radius:24px;padding:14px 14px 12px;box-shadow:0 16px 36px rgba(84,50,24,.16)}
    .eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#f4dfc2}
    h1{font-size:18px;line-height:1.15;margin:6px 0 0}
    .steps{display:flex;gap:6px;margin-top:12px;background:var(--brown-dark);padding:6px;border-radius:999px}
    .steps button{flex:1;border:none;background:transparent;color:#f4ead1;padding:10px 8px;border-radius:999px;cursor:pointer}
    .steps button.active{background:#f8f0e1;color:#5f3c21;font-weight:700}

    .preview-shell{margin-top:12px;background:#decdb7;border:1px solid #d2bea7;border-radius:28px;padding:12px;box-shadow:var(--shadow)}
    .preview-body{background:#4d3625;border-radius:24px;padding:12px}
    .film{position:relative;background:var(--paper);border-radius:22px;padding:12px 12px 54px;box-shadow:0 14px 30px rgba(0,0,0,.18)}
    .stage{position:relative;aspect-ratio:3/4;border-radius:16px;overflow:hidden;background:#d7cab8}
    .stage::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);background-size:8px 8px;opacity:.22;mix-blend-mode:soft-light;pointer-events:none;z-index:4}
    .media,.overlay-layer,.scratch{position:absolute;inset:0;width:100%;height:100%}
    .media{object-fit:contain;background:#d7cab8}
    .overlay-layer{z-index:5}
    .scratch{z-index:6;touch-action:none}
    .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:18px;color:#6c5948;font-size:14px;line-height:1.55}
    .scratch-label{position:absolute;left:0;right:0;bottom:8px;text-align:center;font-size:10px;letter-spacing:.22em;color:#6d583f;font-weight:700;z-index:7;pointer-events:none}
    .film-title{position:absolute;left:16px;right:16px;bottom:10px;text-align:center}
    .film-title input{width:100%;border:none;background:transparent;outline:none;text-align:center;font-size:16px;font-weight:700;color:#5c4633}
    .film-title p{margin:2px 0 0;font-size:10px;letter-spacing:.24em;color:#9c8773;text-transform:uppercase}
    .hidden{display:none !important}

    .panel{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:14px;box-shadow:var(--shadow)}
    .panel h2{margin:0 0 12px;font-size:18px;color:#7a5331}
    .help{border-radius:14px;background:#eee4d7;padding:10px 12px;font-size:13px;line-height:1.5;color:#6a5846}
    .error{background:#fff0e9;color:#9a4f29}

    .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{border:none;border-radius:18px;padding:14px 12px;min-height:50px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .primary{background:#85532f;color:#fff8ee}
    .soft{background:var(--brown-soft);color:#674930}
    .gold{background:var(--gold);color:#5b3a1f}
    .mint{background:var(--mint);color:#35514c}
    .neutral{background:#ece2d5;color:#685340}
    .field{width:100%;border:1px solid #ddcfbd;background:#fff;padding:14px 16px;border-radius:18px;outline:none}
    .section{display:none}
    .section.active{display:block}
    .sub{font-size:12px;font-weight:700;color:#8d7764;letter-spacing:.16em;text-transform:uppercase;margin:0 0 8px}
    .stack{display:flex;flex-direction:column;gap:14px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .chips,.filters{display:flex;flex-wrap:wrap;gap:8px}
    .color-chip{width:34px;height:34px;border-radius:999px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer}
    .color-chip.active{border-color:#6a4a30}
    .sticker-chip,.filter-chip{border:none;border-radius:16px;padding:10px 12px;background:#fff9f0;cursor:pointer}
    .sticker-chip.active{background:#ffefd1;box-shadow:0 0 0 2px #d5b281 inset}
    .filter-chip.active{background:#ffe8c4;box-shadow:0 0 0 2px #e6bc7b inset;color:#68472c}

    .overlay{position:absolute;transform:translate(-50%,-50%);user-select:none;touch-action:none;cursor:grab;max-width:84%}
    .overlay.selected{outline:2px solid rgba(255,255,255,.92);outline-offset:3px;border-radius:14px}
    .overlay.text span{white-space:nowrap;font-weight:700;letter-spacing:.04em;text-shadow:0 1px 0 rgba(255,255,255,.7),0 2px 10px rgba(0,0,0,.18)}
    .overlay.sticker span{filter:drop-shadow(0 2px 8px rgba(0,0,0,.18))}
    .motion-none{}
    .motion-float{animation:motionFloat 3.6s ease-in-out infinite}
    .motion-pop{animation:motionPop 2.2s ease-in-out infinite}
    .motion-shimmer{animation:motionShimmer 2.8s linear infinite}
    .motion-fade{animation:motionFade 1.2s ease both}
    @keyframes motionFloat{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-6px)}}
    @keyframes motionPop{0%,100%{transform:translate(-50%,-50%) scale(1)}40%{transform:translate(-50%,-50%) scale(1.08)}70%{transform:translate(-50%,-50%) scale(.98)}}
    @keyframes motionShimmer{0%{transform:translate(-50%,-50%) scale(1);filter:drop-shadow(0 0 0 rgba(255,255,255,0))}50%{transform:translate(-50%,-50%) scale(1.03);filter:drop-shadow(0 0 12px rgba(255,255,255,.45))}100%{transform:translate(-50%,-50%) scale(1);filter:drop-shadow(0 0 0 rgba(255,255,255,0))}}
    @keyframes motionFade{from{opacity:0;transform:translate(-50%,-50%) translateY(10px)}to{opacity:1;transform:translate(-50%,-50%) translateY(0)}}

    .dock{position:sticky;bottom:0;margin-top:12px;background:rgba(69,48,31,.95);backdrop-filter:blur(10px);border-radius:22px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;box-shadow:0 12px 30px rgba(0,0,0,.22)}
    .dock button{border:none;border-radius:16px;background:rgba(255,255,255,.08);color:#fff5e5;padding:12px 6px;font-weight:700;cursor:pointer}
    .dock button.active{background:#f7efe2;color:#5d3b20}
    @media (max-width:520px){
      .quick-grid,.row2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="eyebrow">放課後 Camera</div>
      <h1>撮って、飾って、削ってひらく。</h1>
      <div class="steps">
        <button class="active" data-step-btn="capture">1 撮る</button>
        <button data-step-btn="decorate">2 飾る</button>
        <button data-step-btn="open">3 ひらく</button>
      </div>
    </div>

    <div class="preview-shell">
      <div class="preview-body">
        <div class="film">
          <div id="stage" class="stage">
            <video id="video" class="media hidden" playsinline muted autoplay></video>
            <img id="previewImage" class="media hidden" alt="preview" />
            <div id="overlayLayer" class="overlay-layer hidden"></div>
            <canvas id="scratchCanvas" class="scratch hidden"></canvas>
            <div id="scratchLabel" class="scratch-label hidden">SCRATCH TO REVEAL</div>
            <div id="placeholder" class="placeholder">まず「カメラで撮る」か「写真を選ぶ」を押してください。</div>
          </div>
          <div class="film-title">
            <input id="titleInput" value="放課後のひみつ" />
            <p>after school memory</p>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-capture" class="panel section active">
      <h2>撮る</h2>
      <div class="quick-grid">
        <button id="captureBtn" class="btn primary">📷 カメラで撮る</button>
        <button id="pickImageBtn" class="btn soft">🖼️ 写真を選ぶ</button>
      </div>
      <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden" />
      <input id="imageInput" type="file" accept="image/*" class="hidden" />
      <div class="help" style="margin-top:12px">スマホでは「カメラで撮る」で端末カメラが開きます。撮ったら自動で「飾る」に進みます。</div>
      <div id="cameraError" class="help error hidden" style="margin-top:10px"></div>
    </div>

    <div id="panel-decorate" class="panel section">
      <h2>飾る</h2>
      <div class="quick-grid">
        <button id="saveBtn" class="btn gold">⬇️ 画像で保存</button>
        <button id="resetBtn" class="btn neutral">↺ 撮りなおす</button>
      </div>
      <details style="margin-top:12px">
        <summary style="cursor:pointer;font-weight:700;color:#7a5331">このアプリで開く用</summary>
        <div class="quick-grid" style="margin-top:10px">
          <button id="saveSceneBtn" class="btn soft">💾 保存</button>
          <button id="shareBtn" class="btn soft">📤 送る</button>
        </div>
      </details>
      <div id="shareMessage" class="help hidden" style="margin-top:12px"></div>
    </div>

    <div id="panel-open" class="panel section">
      <h2>ひらく</h2>
      <div class="quick-grid">
        <button id="openBtn" class="btn mint">📂 ひらく用を開く</button>
        <button id="resetScratchBtn" class="btn neutral">↺ もう一度隠す</button>
      </div>
      <input id="sceneInput" type="file" accept=".revecam,application/json" class="hidden" />
      <div class="help" style="margin-top:12px">「ひらく用」で保存したデータを読み込むと、グレーの膜を削って見られます。</div>
    </div>

    <div id="tab-text" class="panel section">
      <h2>文字</h2>
      <div class="stack">
        <input id="textDraft" class="field" value="for you" placeholder="メッセージを入力" />
        <div><p class="sub">Pastel Colors</p><div id="colorChips" class="chips"></div></div>
        <div class="row2">
          <label><p class="sub">サイズ</p><input id="textSize" type="range" min="18" max="52" value="30" style="width:100%" /></label>
          <label><p class="sub">アニメ</p><select id="textMotion" class="field"><option value="none">なし</option><option value="float">ふわふわ</option><option value="pop">ぷるん</option><option value="shimmer">きらっ</option><option value="fade" selected>じわっ</option></select></label>
        </div>
        <button id="addTextBtn" class="btn" style="background:#f8dde5;color:#7b4c5c">文字を追加</button>
      </div>
    </div>

    <div id="tab-sticker" class="panel section">
      <h2>スタンプ・フィルター</h2>
      <div class="stack">
        <div><p class="sub">Filter</p><div id="filterChips" class="filters"></div></div>
        <div><p class="sub">Stickers</p><div id="stickerChips" class="chips"></div></div>
        <div class="row2">
          <label><p class="sub">サイズ</p><input id="stickerSize" type="range" min="26" max="80" value="42" style="width:100%" /></label>
          <label><p class="sub">アニメ</p><select id="stickerMotion" class="field"><option value="none">なし</option><option value="float" selected>ふわふわ</option><option value="pop">ぷるん</option><option value="shimmer">きらっ</option><option value="fade">じわっ</option></select></label>
        </div>
        <button id="addStickerBtn" class="btn" style="background:#dff1eb;color:#426d62">スタンプを追加</button>
      </div>
    </div>

    <div id="tab-adjust" class="panel section">
      <h2>選択中の調整</h2>
      <div id="selectedEmpty" class="help">写真の上の文字やスタンプをタップすると、ここで調整できます。</div>
      <div id="selectedEditor" class="stack hidden">
        <div class="row2">
          <label><p class="sub">サイズ</p><input id="selectedSize" type="range" min="18" max="52" value="30" style="width:100%" /></label>
          <label><p class="sub">アニメ</p><select id="selectedMotion" class="field"><option value="none">なし</option><option value="float">ふわふわ</option><option value="pop">ぷるん</option><option value="shimmer">きらっ</option><option value="fade">じわっ</option></select></label>
        </div>
        <div id="selectedTextFields" class="stack">
          <label><p class="sub">文字内容</p><input id="selectedTextValue" class="field" value="" /></label>
          <div><p class="sub">文字色</p><div id="selectedColorChips" class="chips"></div></div>
        </div>
        <button id="deleteSelectedBtn" class="btn neutral">🗑 選択を削除</button>
      </div>
    </div>

    <div class="dock">
      <button class="active" data-tab-btn="capture">撮る</button>
      <button data-tab-btn="text">文字</button>
      <button data-tab-btn="sticker">スタンプ</button>
      <button data-tab-btn="adjust">調整</button>
    </div>
  </div>

  <script>
    const FILTERS=[{id:'none',label:'なし',css:'none'},{id:'soft',label:'ふんわり',css:'brightness(1.08) saturate(.92) contrast(.95)'},{id:'sparkle',label:'きらきら',css:'brightness(1.06) saturate(1.14) contrast(1.02)'},{id:'film',label:'フィルム',css:'sepia(.18) contrast(.96) saturate(.92) brightness(1.02)'},{id:'sunset',label:'ゆうやけ',css:'sepia(.16) saturate(1.12) brightness(1.04) hue-rotate(-10deg)'},{id:'sky',label:'そらいろ',css:'brightness(1.05) saturate(.92) hue-rotate(10deg)'},{id:'milk',label:'ミルク',css:'brightness(1.1) contrast(.86) saturate(.88)'},{id:'clear',label:'はっきり',css:'brightness(1.04) contrast(1.08) saturate(1.03)'}];
    const PASTELS=['#F9B7D1','#FFC6A8','#FFD96A','#FFF3B4','#D6F5B0','#B7F0D0','#BDEBFF','#BFCBFF','#DCC8FF','#F4C8FF','#FFFFFF','#F4EEE7'];
    const STICKERS=['💗','✨','🎀','🌼','☁️','🍓','🫧','⭐','🐰','🧸','🌙','💌'];

    const els={
      previewImage:document.getElementById('previewImage'),overlayLayer:document.getElementById('overlayLayer'),scratchCanvas:document.getElementById('scratchCanvas'),scratchLabel:document.getElementById('scratchLabel'),placeholder:document.getElementById('placeholder'),stage:document.getElementById('stage'),
      titleInput:document.getElementById('titleInput'),modeBtns:[...document.querySelectorAll('[data-step-btn]')],tabBtns:[...document.querySelectorAll('[data-tab-btn]')],
      captureBtn:document.getElementById('captureBtn'),pickImageBtn:document.getElementById('pickImageBtn'),saveBtn:document.getElementById('saveBtn'),saveSceneBtn:document.getElementById('saveSceneBtn'),shareBtn:document.getElementById('shareBtn'),openBtn:document.getElementById('openBtn'),resetBtn:document.getElementById('resetBtn'),resetScratchBtn:document.getElementById('resetScratchBtn'),
      cameraInput:document.getElementById('cameraInput'),imageInput:document.getElementById('imageInput'),sceneInput:document.getElementById('sceneInput'),cameraError:document.getElementById('cameraError'),shareMessage:document.getElementById('shareMessage'),
      panelCapture:document.getElementById('panel-capture'),panelDecorate:document.getElementById('panel-decorate'),panelOpen:document.getElementById('panel-open'),tabText:document.getElementById('tab-text'),tabSticker:document.getElementById('tab-sticker'),tabAdjust:document.getElementById('tab-adjust'),
      textDraft:document.getElementById('textDraft'),textSize:document.getElementById('textSize'),textMotion:document.getElementById('textMotion'),colorChips:document.getElementById('colorChips'),addTextBtn:document.getElementById('addTextBtn'),
      stickerChips:document.getElementById('stickerChips'),stickerSize:document.getElementById('stickerSize'),stickerMotion:document.getElementById('stickerMotion'),filterChips:document.getElementById('filterChips'),addStickerBtn:document.getElementById('addStickerBtn'),
      selectedEmpty:document.getElementById('selectedEmpty'),selectedEditor:document.getElementById('selectedEditor'),selectedSize:document.getElementById('selectedSize'),selectedMotion:document.getElementById('selectedMotion'),selectedTextFields:document.getElementById('selectedTextFields'),selectedTextValue:document.getElementById('selectedTextValue'),selectedColorChips:document.getElementById('selectedColorChips'),deleteSelectedBtn:document.getElementById('deleteSelectedBtn')
    };

    const state={step:'capture',activeTab:'capture',capturedImage:'',filterId:'soft',title:'放課後のひみつ',overlays:[],selectedId:null,selectedColor:PASTELS[0],selectedSticker:STICKERS[0],openScene:null,drag:null};

    function uid(){return `${Date.now()}-${Math.random().toString(36).slice(2,8)}`}
    function clamp(n,min,max){return Math.min(max,Math.max(min,n))}
    function fileBaseName(title){return (title||'retro-reveal').trim().replace(/[^a-zA-Z0-9ぁ-んァ-ヶ一-龯ー_-]+/g,'-').replace(/^-+|-+$/g,'')||'retro-reveal'}
    function sceneFileName(title){return `${fileBaseName(title)}.revecam`}
    function currentFilterCss(id){return (FILTERS.find(f=>f.id===id)||FILTERS[0]).css}
    function buildScene(){if(!state.capturedImage)return null;return{version:1,title:state.title,imageDataUrl:state.capturedImage,filter:state.filterId,overlays:state.overlays,createdAt:new Date().toISOString()}}
    function setNote(text,isError=false){const el=isError?els.cameraError:els.shareMessage;if(!text){el.classList.add('hidden');return}el.textContent=text;el.classList.remove('hidden')}
    function getSelected(){return state.overlays.find(item=>item.id===state.selectedId)||null}

    function readImageFile(file){const reader=new FileReader();reader.onload=()=>{state.capturedImage=String(reader.result||'');state.step='decorate';state.activeTab='text';renderAll()};reader.readAsDataURL(file)}
    function resetAll(){state.step='capture';state.activeTab='capture';state.capturedImage='';state.openScene=null;state.overlays=[];state.selectedId=null;state.title='放課後のひみつ';els.titleInput.value=state.title;setNote('');setNote('',true);renderAll()}
    function saveDataUrl(dataUrl,filename){const a=document.createElement('a');a.href=dataUrl;a.download=filename;a.click()}
    function loadImage(src){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=src})}
    async function exportComposedImage(){const scene=buildScene();if(!scene)return;const baseImage=await loadImage(scene.imageDataUrl);const canvas=document.createElement('canvas');canvas.width=baseImage.naturalWidth||1080;canvas.height=baseImage.naturalHeight||1440;const ctx=canvas.getContext('2d');const previewWidth=320;const scale=canvas.width/previewWidth;ctx.filter=currentFilterCss(scene.filter);ctx.drawImage(baseImage,0,0,canvas.width,canvas.height);ctx.filter='none';ctx.textAlign='center';ctx.textBaseline='middle';scene.overlays.forEach(item=>{const x=item.x*canvas.width,y=item.y*canvas.height,size=item.size*scale;if(item.kind==='text'){ctx.save();ctx.font=`700 ${size}px Arial, sans-serif`;ctx.fillStyle=item.color;ctx.shadowColor='rgba(255,255,255,.72)';ctx.shadowBlur=Math.max(2,size*.08);ctx.fillText(item.value,x,y);ctx.restore()}else{ctx.save();ctx.font=`${size}px Arial, sans-serif`;ctx.fillText(item.value,x,y);ctx.restore()}});saveDataUrl(canvas.toDataURL('image/png'),`${fileBaseName(scene.title)}.png`);setNote(`画像で保存しました: ${fileBaseName(scene.title)}.png`)}
    function saveScene(){const scene=buildScene();if(!scene)return;const blob=new Blob([JSON.stringify(scene,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=sceneFileName(scene.title);a.click();URL.revokeObjectURL(url);setNote(`ひらく用を保存しました: ${sceneFileName(scene.title)}`)}
    async function shareScene(){const scene=buildScene();if(!scene)return;const file=new File([JSON.stringify(scene,null,2)],sceneFileName(scene.title),{type:'application/json'});try{if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({title:scene.title,text:'このアプリで開く写真を送ります',files:[file]});setNote('ひらく用を送る画面を開きました。')}else{setNote('この端末では直接送れないため、先に「ひらく用を保存」を使ってください。')}}catch(e){setNote('送信はキャンセルされました。')}}
    function openSceneFile(file){const reader=new FileReader();reader.onload=()=>{try{const parsed=JSON.parse(String(reader.result||''));if(!parsed.imageDataUrl||!Array.isArray(parsed.overlays))throw new Error('invalid');state.openScene=parsed;state.step='open';state.activeTab='capture';renderAll()}catch(e){setNote('ひらく用データを読み込めませんでした。')}};reader.readAsText(file)}

    function renderColorChips(root,selectedColor,onSelect){root.innerHTML='';PASTELS.forEach(color=>{const btn=document.createElement('button');btn.className='color-chip'+(selectedColor===color?' active':'');btn.style.background=color;btn.addEventListener('click',()=>onSelect(color));root.appendChild(btn)})}
    function renderStickerChips(){els.stickerChips.innerHTML='';STICKERS.forEach(sticker=>{const btn=document.createElement('button');btn.className='sticker-chip'+(state.selectedSticker===sticker?' active':'');btn.textContent=sticker;btn.style.fontSize='26px';btn.addEventListener('click',()=>{state.selectedSticker=sticker;renderStickerChips()});els.stickerChips.appendChild(btn)})}
    function renderFilterChips(){els.filterChips.innerHTML='';FILTERS.forEach(filter=>{const btn=document.createElement('button');btn.className='filter-chip'+(state.filterId===filter.id?' active':'');btn.textContent=filter.label;btn.addEventListener('click',()=>{state.filterId=filter.id;renderFilterChips();renderPreview()});els.filterChips.appendChild(btn)})}
    function addText(){if(!state.capturedImage||!els.textDraft.value.trim())return;const item={id:uid(),kind:'text',x:.5,y:.82,size:Number(els.textSize.value),color:state.selectedColor,motion:els.textMotion.value,value:els.textDraft.value.trim()};state.overlays.push(item);state.selectedId=item.id;state.activeTab='adjust';renderAll()}
    function addSticker(){if(!state.capturedImage)return;const item={id:uid(),kind:'sticker',x:.78,y:.2,size:Number(els.stickerSize.value),motion:els.stickerMotion.value,value:state.selectedSticker};state.overlays.push(item);state.selectedId=item.id;state.activeTab='adjust';renderAll()}
    function renderSelectedEditor(){const selected=getSelected();const has=!!selected;els.selectedEmpty.classList.toggle('hidden',has);els.selectedEditor.classList.toggle('hidden',!has);if(!selected)return;els.selectedSize.min=selected.kind==='text'?'18':'26';els.selectedSize.max=selected.kind==='text'?'52':'80';els.selectedSize.value=selected.size;els.selectedMotion.value=selected.motion;if(selected.kind==='text'){els.selectedTextFields.classList.remove('hidden');els.selectedTextValue.value=selected.value;renderColorChips(els.selectedColorChips,selected.color,(color)=>{selected.color=color;renderPreview();renderSelectedEditor()})}else{els.selectedTextFields.classList.add('hidden')}}
    function renderOverlayLayer(items,selectable){els.overlayLayer.innerHTML='';els.overlayLayer.classList.remove('hidden');items.forEach(item=>{const wrap=document.createElement('div');wrap.className=`overlay ${item.kind} motion-${item.motion}`+(selectable&&state.selectedId===item.id?' selected':'');wrap.style.left=`${item.x*100}%`;wrap.style.top=`${item.y*100}%`;const span=document.createElement('span');span.textContent=item.value;span.style.fontSize=`${item.size}px`;if(item.kind==='text')span.style.color=item.color;wrap.appendChild(span);if(selectable){wrap.addEventListener('pointerdown',(e)=>{e.preventDefault();state.selectedId=item.id;const rect=els.stage.getBoundingClientRect();state.drag={id:item.id,startX:e.clientX,startY:e.clientY,baseX:item.x,baseY:item.y,width:rect.width,height:rect.height};state.activeTab='adjust';renderAll()})}else{wrap.style.pointerEvents='none'}els.overlayLayer.appendChild(wrap)})}
    function initScratch(){if(!state.openScene)return;const canvas=els.scratchCanvas;const rect=canvas.getBoundingClientRect();const dpr=window.devicePixelRatio||1;canvas.width=Math.max(1,Math.round(rect.width*dpr));canvas.height=Math.max(1,Math.round(rect.height*dpr));const ctx=canvas.getContext('2d');ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);ctx.clearRect(0,0,rect.width,rect.height);ctx.fillStyle='#C8C3BC';ctx.fillRect(0,0,rect.width,rect.height);ctx.fillStyle='rgba(255,255,255,.16)';for(let i=0;i<7;i++){ctx.beginPath();ctx.arc((rect.width/8)*(i+1),rect.height*.2,rect.width*.08,0,Math.PI*2);ctx.fill()}}
    function scratchAt(clientX,clientY){const canvas=els.scratchCanvas;const rect=canvas.getBoundingClientRect();const ctx=canvas.getContext('2d');ctx.save();ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(clientX-rect.left,clientY-rect.top,Math.max(28,rect.width*.06),0,Math.PI*2);ctx.fill();ctx.restore()}

    function renderStepButtons(){els.modeBtns.forEach(btn=>btn.classList.toggle('active',btn.dataset.stepBtn===state.step))}
    function renderTabs(){els.tabBtns.forEach(btn=>btn.classList.toggle('active',btn.dataset.tabBtn===state.activeTab))}
    function renderSections(){
      els.panelCapture.classList.toggle('active',state.activeTab==='capture'&&state.step==='capture');
      els.panelDecorate.classList.toggle('active',state.activeTab==='capture'&&state.step==='decorate');
      els.panelOpen.classList.toggle('active',state.activeTab==='capture'&&state.step==='open');
      els.tabText.classList.toggle('active',state.activeTab==='text'&&state.step==='decorate');
      els.tabSticker.classList.toggle('active',state.activeTab==='sticker'&&state.step==='decorate');
      els.tabAdjust.classList.toggle('active',state.activeTab==='adjust'&&state.step==='decorate');
    }
    function renderPreview(){
      els.previewImage.classList.add('hidden');els.overlayLayer.classList.add('hidden');els.scratchCanvas.classList.add('hidden');els.scratchLabel.classList.add('hidden');els.placeholder.classList.add('hidden');
      if(state.step==='capture'){els.placeholder.classList.remove('hidden');return}
      if(state.step==='open'){
        if(!state.openScene){els.placeholder.classList.remove('hidden');els.placeholder.textContent='「ひらく用を開く」でデータを選んでください。';return}
        els.previewImage.src=state.openScene.imageDataUrl;els.previewImage.style.filter=currentFilterCss(state.openScene.filter);els.previewImage.classList.remove('hidden');renderOverlayLayer(state.openScene.overlays,false);els.scratchCanvas.classList.remove('hidden');els.scratchLabel.classList.remove('hidden');setTimeout(initScratch,0);return;
      }
      if(state.capturedImage){els.previewImage.src=state.capturedImage;els.previewImage.style.filter=currentFilterCss(state.filterId);els.previewImage.classList.remove('hidden');renderOverlayLayer(state.overlays,true);return}
      els.placeholder.classList.remove('hidden');
    }
    function renderButtons(){const ready=!!state.capturedImage;[els.saveBtn,els.saveSceneBtn,els.shareBtn,els.addTextBtn,els.addStickerBtn].forEach(btn=>btn.disabled=!ready)}
    function renderAll(){state.title=els.titleInput.value;renderStepButtons();renderTabs();renderSections();renderButtons();renderPreview();renderSelectedEditor()}

    function rerenderMainColors(){renderColorChips(els.colorChips,state.selectedColor,(color)=>{state.selectedColor=color;rerenderMainColors()})}
    rerenderMainColors();renderStickerChips();renderFilterChips();renderAll();

    els.captureBtn.addEventListener('click',()=>els.cameraInput.click());
    els.pickImageBtn.addEventListener('click',()=>els.imageInput.click());
    els.openBtn.addEventListener('click',()=>els.sceneInput.click());
    els.resetBtn.addEventListener('click',resetAll);
    els.saveBtn.addEventListener('click',exportComposedImage);
    els.saveSceneBtn.addEventListener('click',saveScene);
    els.shareBtn.addEventListener('click',shareScene);
    els.addTextBtn.addEventListener('click',addText);
    els.addStickerBtn.addEventListener('click',addSticker);
    els.resetScratchBtn.addEventListener('click',initScratch);
    els.cameraInput.addEventListener('change',(e)=>{const file=e.target.files&&e.target.files[0];if(file)readImageFile(file);e.target.value=''});
    els.imageInput.addEventListener('change',(e)=>{const file=e.target.files&&e.target.files[0];if(file)readImageFile(file);e.target.value=''});
    els.sceneInput.addEventListener('change',(e)=>{const file=e.target.files&&e.target.files[0];if(file)openSceneFile(file);e.target.value=''});
    els.modeBtns.forEach(btn=>btn.addEventListener('click',()=>{state.step=btn.dataset.stepBtn;if(state.step==='decorate'&&!state.capturedImage)state.step='capture';state.activeTab='capture';renderAll()}));
    els.tabBtns.forEach(btn=>btn.addEventListener('click',()=>{if(state.step==='capture'||state.step==='open'){state.activeTab='capture'}else{state.activeTab=btn.dataset.tabBtn}renderAll()}));
    els.selectedSize.addEventListener('input',()=>{const item=getSelected();if(!item)return;item.size=Number(els.selectedSize.value);renderPreview()});
    els.selectedMotion.addEventListener('change',()=>{const item=getSelected();if(!item)return;item.motion=els.selectedMotion.value;renderPreview()});
    els.selectedTextValue.addEventListener('input',()=>{const item=getSelected();if(!item||item.kind!=='text')return;item.value=els.selectedTextValue.value;renderPreview()});
    els.deleteSelectedBtn.addEventListener('click',()=>{if(!state.selectedId)return;state.overlays=state.overlays.filter(item=>item.id!==state.selectedId);state.selectedId=null;renderAll()});
    window.addEventListener('pointermove',(e)=>{if(!state.drag)return;const item=state.overlays.find(it=>it.id===state.drag.id);if(!item)return;const dx=(e.clientX-state.drag.startX)/state.drag.width;const dy=(e.clientY-state.drag.startY)/state.drag.height;item.x=clamp(state.drag.baseX+dx,.05,.95);item.y=clamp(state.drag.baseY+dy,.05,.95);renderPreview();renderSelectedEditor()});
    window.addEventListener('pointerup',()=>{state.drag=null});
    els.scratchCanvas.addEventListener('pointerdown',(e)=>scratchAt(e.clientX,e.clientY));
    els.scratchCanvas.addEventListener('pointermove',(e)=>{if(e.buttons!==1)return;scratchAt(e.clientX,e.clientY)});
  </script>
</body>
</html>
